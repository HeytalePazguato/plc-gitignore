version: 2
updates:
  # GitHub Actions: keep workflow action versions current.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    target-branch: "develop"
    labels:
      - "dependencies"
      - "ci"
    groups:
      # One PR per scheduled run for all action bumps. Without grouping you
      # get one PR per action per cycle, which is noise rather than signal.
      gha:
        applies-to: version-updates
        patterns:
          - "*"

  - package-ecosystem: "gomod"
    directory: "/"
    schedule: { interval: "weekly" }
    open-pull-requests-limit: 5
    target-branch: "develop"
    labels: ["dependencies"]
    groups:
      go:
        applies-to: version-updates
        patterns: ["*"]
