name: release

# Stable release flow. Triggered when commits land on main (typically from a
# release/* PR that bumped the VERSION file). Reads VERSION as the source of
# truth, tags v<VERSION>, and runs the release tool to publish to all
# configured channels.
#
# Idempotent: if the tag already exists (i.e. main was pushed without a
# VERSION bump), the workflow exits cleanly without retagging or republishing.
on:
  push:
    branches: [main]

permissions:
  contents: write
  packages: write   # push container images to GHCR

concurrency:
  group: release-main
  cancel-in-progress: false   # never cancel a release mid-flight

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - uses: actions/setup-go@v6
        with:
          go-version: "1.23.x"
          cache: true

      - uses: docker/setup-qemu-action@v4
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Read VERSION
        id: ver
        run: |
          set -euo pipefail
          v=$(tr -d '[:space:]' < VERSION)
          if [ -z "$v" ]; then
            echo "VERSION file is empty" >&2
            exit 1
          fi
          echo "version=$v" >> "$GITHUB_OUTPUT"
          echo "tag=v$v"    >> "$GITHUB_OUTPUT"

      - name: Template-sentinel guard
        id: sentinel
        # VERSION starts at 0.0.0 on a fresh template clone. Don't try to
        # release a "v0.0.0" — it means "not actually released yet". The
        # user bumps VERSION to 0.0.1 (or whatever) on their first
        # release/* branch.
        run: |
          set -euo pipefail
          if [ "${{ steps.ver.outputs.version }}" = "0.0.0" ]; then
            echo "VERSION=0.0.0 is the template sentinel; nothing to release."
            echo "skip=true" >> "$GITHUB_OUTPUT"
          else
            echo "skip=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Idempotence guard
        id: guard
        if: steps.sentinel.outputs.skip == 'false'
        run: |
          set -euo pipefail
          git fetch --tags --quiet
          if git rev-parse "${{ steps.ver.outputs.tag }}" >/dev/null 2>&1; then
            # Tag exists. Only treat as "skip" if it points at HEAD or an
            # ancestor — a tag that points at an unrelated commit (e.g.
            # the template's initial commit) is a bootstrap-tag artifact
            # the user needs to delete, not a real prior release.
            tag_sha=$(git rev-parse "${{ steps.ver.outputs.tag }}")
            if git merge-base --is-ancestor "$tag_sha" HEAD; then
              echo "Tag ${{ steps.ver.outputs.tag }} already exists at $tag_sha; skipping release."
              echo "exists=true" >> "$GITHUB_OUTPUT"
            else
              echo "::error::Tag ${{ steps.ver.outputs.tag }} exists at $tag_sha which is not an ancestor of HEAD. Delete the stale tag (\`git push origin :refs/tags/${{ steps.ver.outputs.tag }}\`) and re-run."
              exit 1
            fi
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Push tag
        if: steps.sentinel.outputs.skip == 'false' && steps.guard.outputs.exists == 'false'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git tag "${{ steps.ver.outputs.tag }}"
          git push origin "${{ steps.ver.outputs.tag }}"

      - if: steps.guard.outputs.exists == 'false' && steps.sentinel.outputs.skip == 'false'
        uses: goreleaser/goreleaser-action@v7
        with:
          version: "~> v2"
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          HOMEBREW_TAP_GITHUB_TOKEN: ${{ secrets.HOMEBREW_TAP_GITHUB_TOKEN }}
          SCOOP_GITHUB_TOKEN: ${{ secrets.SCOOP_GITHUB_TOKEN }}
